<!DOCTYPE html>
<html lang="en">
<head>
    
        <title>Weather Website</title>
        <link rel = "stylesheet" href = "style.CSS">

    </head>

<body class = "Page">

    <div class = "Page_Div">

        <div class = "HeadingDiv">

            

            <h1 class = "Heading"><img src="Logo.jpg" class = "Img"> Weather Forecast</h1>

        </div>

        <hr>

        <div class = "TextDiv">

         <p class = "txt">This program allows you to view weather forecast on different cities around the world. It Shows the Following :- Temperature, Humidity, Wind and Weather.
            
         </p>
        
        </div>

        <div class = "InputDivCentre">

        <div class = "InputDiv">

        <select class="Input" id = "Country">

            <option value="">Select Country</option>

        </select>
        <p></p>
        

        <input class = "Input" type="text" placeholder="Enter City" id = "City" class = "input">

        <p></p>

        <button onclick = "Fetch_Data()" class = "Button">Forecast</button>
        </div>
        </div>

        <div class = "CentreOutput">
        <div class = "Output">

        <p class = "txt">Result Will be Displayed here - </p>
        <p class = "txt" id = "Name_of_City"></p>

         <img id="WeatherImage" class = "WeatherImage" src="" alt="" >

        <p class = "txt" id = "Temp"></p>

        <p class = "txt" id = "Weather"></p>

        <p class = "txt" id = "Humidity"></p>

        <p class =  "txt" id = "Wind"></p>
        </div>
        </div>

        <script src = "script.JS"></script>




    </div>

    
</body>
</html>
